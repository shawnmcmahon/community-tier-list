# Legacy Fly.io config kept for reference only.
# AWS Lightsail is the primary phase 6 deployment target.
app = "community-tier-list-realtime-shawn"
primary_region = "den"

[build]
  dockerfile = "apps/realtime/Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
