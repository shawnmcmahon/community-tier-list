services:
  realtime:
    build:
      context: ../../../..
      dockerfile: apps/realtime/Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "3001"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - realtime
    ports:
      - "80:80"
      - "443:443"
    environment:
      REALTIME_DOMAIN: ${REALTIME_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
